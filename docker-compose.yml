services:
  nanomdm:
    image: ghcr.io/micromdm/nanomdm:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./nanomdm/db:/db
      - ./certs/apns:/certs/apns:ro
    environment:
      NANOMDM_API_KEY: ${NANOMDM_API_KEY}
      NANOMDM_DEBUG: "true"
    command: >
      -storage file
      -storage-path /db
      -api ${NANOMDM_API_KEY}
      -debug
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  scep:
    build:
      context: ./scep
    restart: unless-stopped
    ports:
      - "2016:2016"
    volumes:
      - ./scep/depot:/depot
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2016/scep"]
      interval: 30s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 12h
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NANOMDM_URL: http://nanomdm:9000
      NANOMDM_API_KEY: ${NANOMDM_API_KEY}
      DOMAIN: ${DOMAIN}
      APNS_TOPIC: ${APNS_TOPIC}
      SCEP_URL: ${SCEP_URL}
      SCEP_CHALLENGE: ${SCEP_CHALLENGE}
      ENROLLMENT_PROFILE_PATH: /app/nanomdm/enrollment/enrollment.mobileconfig
    volumes:
      - ./data:/app/data
      - ./certs/apns:/app/certs/apns:ro
      - ./certs/profile-signing:/app/certs/profile-signing:ro
      - ./nanomdm/enrollment:/app/nanomdm/enrollment
    depends_on:
      nanomdm:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/ssl/certs:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      nanomdm:
        condition: service_started
